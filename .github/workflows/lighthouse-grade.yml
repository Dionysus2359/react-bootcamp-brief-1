name: Lighthouse Grading Pipeline

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Vercel URL
        id: read-url
        run: |
          if [ ! -f submission.json ]; then
            echo "submission.json not found!"
            exit 1
          fi
          URL=$(jq -r '.url' submission.json)
          if [ "$URL" == "PASTE_YOUR_LIVE_VERCEL_URL_HERE" ] || [ -z "$URL" ]; then
            echo "Please update submission.json with your actual live Vercel URL."
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.read-url.outputs.url }}
          temporaryPublicStorage: true

      - name: Calculate Score and Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // The lighthouse-ci-action creates a .lighthouseci directory with results
            let manifest;
            try {
              manifest = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
            } catch (err) {
              core.setFailed("Could not read Lighthouse manifest. Did the audit run successfully?");
              return;
            }
            
            const reportPath = path.join('.lighthouseci', manifest[0].jsonPath);
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            
            const perf = report.categories.performance.score;
            const a11y = report.categories.accessibility.score;
            const bp = report.categories['best-practices'].score;
            const seo = report.categories.seo.score;
            
            const perfPct = Math.round(perf * 100);
            const a11yPct = Math.round(a11y * 100);
            const bpPct = Math.round(bp * 100);
            const seoPct = Math.round(seo * 100);
            
            const avg = (perfPct + a11yPct + bpPct + seoPct) / 4;
            const totalPoints = Math.floor(avg * 0.20);
            
            let passed = true;
            if (perfPct < 90 || a11yPct < 90 || bpPct < 90 || seoPct < 90) {
              passed = false;
            }
            
            const commentBody = `
            ## 🚦 Lighthouse Grading Report
            
            | Category | Score |
            | --- | --- |
            | ⚡ Performance | ${perfPct} |
            | ♿ Accessibility | ${a11yPct} |
            | 🛠 Best Practices | ${bpPct} |
            | 🔎 SEO | ${seoPct} |
            
            **Average Score:** ${avg}
            **Final Points:** ${totalPoints} / 20
            
            ${passed ? '✅ **All categories >= 90! Assertion Passed.**' : '❌ **One or more categories failed to meet the 90% threshold.**'}
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
            
            if (!passed) {
              core.setFailed("Lighthouse scores did not meet the 90% threshold in all categories.");
            }
